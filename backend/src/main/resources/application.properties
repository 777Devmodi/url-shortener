spring.application.name=url-shortener


spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.access-token-secret=my-super-secret-key-for-access-at-least-32-chars-long
app.jwt.refresh-token-secret=another-super-secret-key-for-refresh-at-least-32-chars
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000


# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000   # 30 minutes in milliseconds

# Rate Limiting (Token Bucket)
app.rate-limit.capacity=10        # burst capacity
app.rate-limit.refill-rate=2.0    # tokens per second

# Redis Streams
app.redis.stream.click-events=click-events
app.redis.stream.consumer-group=click-processors